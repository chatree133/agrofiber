version: '3.8'

services:
  route-optimizer:
    build:
      context: ./route-optimizer
      dockerfile: Dockerfile
    container_name: route-optimizer
    ports:
      - "8080:8080"
    environment:
      - PYTHONUNBUFFERED=1
    restart: unless-stopped

  backend:
    build:
      context: ./backend
      dockerfile: Dockerfile
    container_name: erp-backend
    ports:
      - "4000:4000"
    environment:
      - PORT=4000
      - NODE_ENV=production
      - OPTIMIZER_URL=http://route-optimizer:8080/optimize
      - JWT_SECRET=${JWT_SECRET:-replace-with-strong-secret}
      - JWT_EXPIRES_IN=${JWT_EXPIRES_IN:-8h}
      - DB_USER=${DB_USER:-agrofiber}
      - DB_PASSWORD=${DB_PASSWORD:-agro@2027}
      - DB_SERVER=${DB_SERVER:-host.docker.internal}
      - DB_DATABASE=${DB_DATABASE:-AgrofiberERP}
      - DB_PORT=${DB_PORT:-1433}
      - DB_ENCRYPT=${DB_ENCRYPT:-false}
      - DB_TRUST_SERVER_CERTIFICATE=${DB_TRUST_SERVER_CERTIFICATE:-true}
    volumes:
      - backend-uploads:/app/uploads
    extra_hosts:
      - "host.docker.internal:host-gateway"
    depends_on:
      - route-optimizer
    restart: unless-stopped

  frontend:
    build:
      context: ./frontend
      dockerfile: Dockerfile
    container_name: erp-frontend
    ports:
      - "80:80"
    depends_on:
      - backend
    restart: unless-stopped

volumes:
  backend-uploads:
